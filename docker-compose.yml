services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dropzone-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    ports:
      - "8080:80"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=sqlite
    depends_on:
      - redis

  redis:
    image: redis:alpine
    container_name: dropzone-redis
    restart: unless-stopped

volumes:
  storage: